<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotoCasma - Pedir Carrera</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/socket.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
    .container { max-width: 480px; margin: 0 auto; background: #f3f4f6; min-height: 100vh; padding-bottom: 80px; }
    .header { background: linear-gradient(135deg, #fbbf24, #f59e0b); padding: 16px; display: flex; align-items: center; gap: 12px; color: #1f2937; }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header i { font-size: 20px; cursor: pointer; }
    .form-card { background: white; margin: 16px; border-radius: 18px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px; }
    .input-group { display: flex; align-items: center; background: #f9fafb; border-radius: 12px; padding: 12px; border: 1px solid #e5e7eb; }
    .input-group i { color: #f59e0b; margin-right: 10px; font-size: 16px; }
    .input-group input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; }
    .vehicle-options { display: flex; gap: 10px; }
    .vehicle-card { flex: 1; text-align: center; padding: 16px 8px; border-radius: 14px; border: 2px solid #e5e7eb; cursor: pointer; transition: 0.2s; }
    .vehicle-card.selected { border-color: #fbbf24; background: #fffbeb; }
    .vehicle-card i { font-size: 28px; color: #f59e0b; }
    .vehicle-card .name { font-weight: 600; font-size: 14px; margin-top: 4px; }
    .vehicle-card .price { font-size: 13px; color: #6b7280; }
    .price-estimate { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid #e5e7eb; margin-top: 12px; }
    .price-estimate .amount { font-size: 24px; font-weight: 800; color: #1f2937; }
    .btn-primary { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1f2937; font-weight: 700; border: none; border-radius: 50px; padding: 16px; font-size: 16px; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(251,191,36,0.4); transition: 0.2s; }
    .btn-primary:hover { transform: scale(1.02); }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; border-top: 1px solid #e5e7eb; max-width: 480px; }
    .nav-item { text-align: center; font-size: 12px; color: #9ca3af; cursor: pointer; }
    .nav-item.active { color: #f59e0b; }
    .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <i class="fas fa-arrow-left" onclick="history.back()"></i>
    <h1>Pedir Carrera</h1>
  </div>
  <div class="form-card">
    <div class="form-group">
      <label><i class="fas fa-circle-dot" style="color:#10b981"></i> Punto de partida</label>
      <div class="input-group"><i class="fas fa-location-dot"></i><input type="text" placeholder="Direccion de recogida" value="Av. Casma 123" /></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-flag-checkered" style="color:#ef4444"></i> Destino</label>
      <div class="input-group"><i class="fas fa-location-arrow"></i><input type="text" placeholder="A donde vas?" /></div>
    </div>
    <div class="form-group">
      <label>Tipo de vehiculo</label>
      <div class="vehicle-options">
        <div class="vehicle-card selected" onclick="selectVehicle(this)"><i class="fas fa-motorcycle"></i><div class="name">MotoTaxi</div><div class="price">S/ 5 - 8</div></div>
        <div class="vehicle-card" onclick="selectVehicle(this)"><i class="fas fa-motorcycle"></i><div class="name">Moto Taxi</div><div class="price">S/ 7 - 12</div></div>
      </div>
    </div>
    <div class="price-estimate">
      <span style="color:#6b7280;font-weight:500">Precio estimado</span>
      <span class="amount">S/ 8.00</span>
    </div>
    <button class="btn-primary" onclick="confirmRide()"><i class="fas fa-motorcycle"></i> SOLICITAR AHORA</button>
  </div>
  <div class="nav-bottom">
    <div class="nav-item" onclick="location.href='../index.html'"><i class="fas fa-home"></i>Inicio</div>
    <div class="nav-item active"><i class="fas fa-plus-circle"></i>Pedir</div>
    <div class="nav-item" onclick="location.href='drivers.html'"><i class="fas fa-search"></i>Cercanos</div>
    <div class="nav-item" onclick="location.href='history.html'"><i class="fas fa-clock"></i>Historial</div>
    <div class="nav-item" onclick="location.href='profile.html'"><i class="fas fa-user"></i>Perfil</div>
  </div>
</div>
<script>
  let pickupInput, destInput, priceDisplay;
  document.addEventListener('DOMContentLoaded', () => {
    pickupInput = document.querySelector('input[placeholder*="Direccion"]');
    destInput = document.querySelector('input[placeholder*="donde"]');
    priceDisplay = document.querySelector('.amount');
    if (!API.isLoggedIn()) {
      document.querySelector('.btn-primary').textContent = ' INICIAR SESION PRIMERO';
      document.querySelector('.btn-primary').onclick = () => { location.href = 'profile.html'; };
    }
  });
  function selectVehicle(el) { document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); }
  async function confirmRide() {
    if (!API.isLoggedIn()) { alert('Inicia sesion primero'); location.href = 'profile.html'; return; }
    try {
      await API.requestRide(
        { address: pickupInput?.value || 'Av. Casma 123', lat: window.userLat || -9.4531, lng: window.userLng || -78.2989 },
        { address: destInput?.value || 'Plaza de Armas', lat: -9.455, lng: -78.300 },
        8
      );
      alert('Viaje solicitado! Buscando conductor...');
      location.href = 'trip.html';
    } catch(err) { alert('Error: ' + err.message); }
  }
</script>
</body>
</html>
