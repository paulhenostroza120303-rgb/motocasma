<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotoCasma - Conductor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/socket.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
    .container { max-width: 480px; margin: 0 auto; background: #f3f4f6; min-height: 100vh; padding-bottom: 80px; }
    .header { background: linear-gradient(135deg, #fbbf24, #f59e0b); padding: 16px; display: flex; align-items: center; justify-content: space-between; color: #1f2937; }
    .header h1 { font-size: 20px; font-weight: 800; }
    .earnings-card { background: linear-gradient(135deg, #1f2937, #374151); margin: 16px; border-radius: 20px; padding: 20px; color: white; }
    .earnings-card .amount { font-size: 36px; font-weight: 800; }
    .earnings-card .label { font-size: 14px; color: #9ca3af; }
    .earnings-row { display: flex; justify-content: space-between; margin-top: 16px; }
    .earnings-row div { text-align: center; }
    .earnings-row .num { font-size: 20px; font-weight: 700; }
    .earnings-row .lbl { font-size: 12px; color: #9ca3af; }
    .toggle-card { background: white; margin: 16px; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .toggle-card span { font-weight: 600; color: #1f2937; }
    .toggle { width: 50px; height: 28px; background: #d1d5db; border-radius: 50px; position: relative; cursor: pointer; transition: 0.3s; }
    .toggle.active { background: #10b981; }
    .toggle::after { content: ''; position: absolute; width: 24px; height: 24px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .toggle.active::after { left: 24px; }
    .section-title { font-size: 18px; font-weight: 700; color: #1f2937; margin: 16px 16px 8px; }
    .request-item { background: white; margin: 8px 16px; padding: 16px; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; }
    .request-item .info { flex: 1; }
    .request-item .name { font-weight: 600; font-size: 16px; }
    .request-item .detail { font-size: 13px; color: #6b7280; }
    .request-item .price { font-size: 18px; font-weight: 700; color: #059669; }
    .btn-small { background: #fbbf24; border: none; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 13px; cursor: pointer; }
    .btn-green { background: #10b981; color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 13px; cursor: pointer; }
    .btn-red { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 13px; cursor: pointer; }
    .active-ride { background: white; margin: 16px; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); }
    .active-ride .user-name { font-size: 18px; font-weight: 700; }
    .active-ride .route { font-size: 14px; color: #6b7280; margin: 8px 0; }
    .active-ride .actions { display: flex; gap: 10px; margin-top: 12px; }
    .active-ride .actions button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; border-top: 1px solid #e5e7eb; max-width: 480px; }
    .nav-item { text-align: center; font-size: 12px; color: #9ca3af; cursor: pointer; }
    .nav-item.active { color: #f59e0b; }
    .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
    .empty { text-align: center; color: #9ca3af; padding: 40px; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <i class="fas fa-arrow-left" onclick="history.back()"></i>
    <h1><i class="fas fa-motorcycle"></i> Conductor</h1>
    <i class="fas fa-sliders"></i>
  </div>

  <div class="earnings-card">
    <div class="label">Ganancias de hoy</div>
    <div class="amount" id="earningsAmount">S/ 0.00</div>
    <div class="earnings-row">
      <div><div class="num" id="tripsCount">0</div><div class="lbl">Viajes</div></div>
      <div><div class="num" id="driverRating">5.0</div><div class="lbl">Estrella</div></div>
      <div><div class="num" id="onlineTime">--</div><div class="lbl">Tiempo</div></div>
    </div>
  </div>

  <div class="toggle-card">
    <span><i class="fas fa-power-off" id="statusIcon" style="color:#9ca3af"></i> <span id="statusLabel">Desconectado</span></span>
    <div class="toggle" id="toggleBtn" onclick="toggleAvailability()"></div>
  </div>

  <div id="activeRideSection" style="display:none"></div>

  <div class="section-title">Solicitudes Cercanas</div>
  <div id="requestsContainer"><div class="empty">Activate para recibir solicitudes</div></div>

  <div class="nav-bottom">
    <div class="nav-item" onclick="location.href='../index.html'"><i class="fas fa-home"></i>Inicio</div>
    <div class="nav-item active"><i class="fas fa-motorcycle"></i>Conducir</div>
    <div class="nav-item"><i class="fas fa-chart-line"></i>Ganancias</div>
    <div class="nav-item" onclick="location.href='history.html'"><i class="fas fa-clock"></i>Historial</div>
    <div class="nav-item" onclick="location.href='profile.html'"><i class="fas fa-user"></i>Perfil</div>
  </div>
</div>
<script>
  if (!API.isLoggedIn()) { location.href = 'profile.html'; }
  let available = false;
  let currentRide = null;
  let watchId = null;
  let onlineTimer = null;
  let updatingRide = false;

  function updateOnlineTime() {
    const start = localStorage.getItem('motocasma_online_start');
    if (!start) { document.getElementById('onlineTime').textContent = '--'; return; }
    const elapsed = Math.floor((Date.now() - parseInt(start)) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    document.getElementById('onlineTime').textContent = (h > 0 ? h + 'h ' : '') + m + 'min';
  }

  function updateStatus() {
    const icon = document.getElementById('statusIcon');
    const label = document.getElementById('statusLabel');
    const toggle = document.getElementById('toggleBtn');
    if (available) {
      icon.className = 'fas fa-power-off';
      icon.style.color = '#10b981';
      label.textContent = 'Disponible';
      toggle.classList.add('active');
    } else {
      icon.className = 'fas fa-power-off';
      icon.style.color = '#9ca3af';
      label.textContent = 'Desconectado';
      toggle.classList.remove('active');
    }
  }

  async function toggleAvailability() {
    available = !available;
    updateStatus();
    try {
      await API.request('/api/drivers/availability', { method: 'PUT', body: JSON.stringify({ available }) });
    } catch {}
    if (available) {
      if (!localStorage.getItem('motocasma_online_start')) {
        localStorage.setItem('motocasma_online_start', Date.now().toString());
      }
      onlineTimer = setInterval(updateOnlineTime, 10000);
      updateOnlineTime();
      SOCKET.connect();
      startLocationTracking();
    } else {
      localStorage.removeItem('motocasma_online_start');
      if (onlineTimer) { clearInterval(onlineTimer); onlineTimer = null; }
      document.getElementById('onlineTime').textContent = '--';
      stopLocationTracking();
    }
  }

  function startLocationTracking() {
    if (navigator.geolocation) {
      watchId = navigator.geolocation.watchPosition(async (pos) => {
        const { latitude: lat, longitude: lng } = pos.coords;
        try {
          await API.request('/api/drivers/location', { method: 'PUT', body: JSON.stringify({ lat, lng }) });
          await API.request('/api/drivers/availability', { method: 'PUT', body: JSON.stringify({ available: true }) });
        } catch {}
        if (currentRide) {
          const userId = currentRide.userId?._id || currentRide.userId;
          SOCKET.emit('driver:location', { rideId: currentRide._id, userId, lat, lng });
        }
      }, () => {}, { enableHighAccuracy: true, maximumAge: 10000 });
    }
  }

  function stopLocationTracking() {
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    API.request('/api/drivers/availability', { method: 'PUT', body: JSON.stringify({ available: false }) }).catch(() => {});
  }

  async function loadActiveRide() {
    try {
      const data = await API.getDriverActiveRide();
      if (data.ride) {
        currentRide = data.ride;
        showActiveRide(data.ride);
      }
    } catch {}
    loadDriverStats();
  }

  async function loadDriverStats() {
    try {
      const data = await API.request('/api/drivers/status');
      if (data.driver) {
        document.getElementById('earningsAmount').textContent = 'S/ ' + (data.driver.earnings || 0).toFixed(2);
        document.getElementById('tripsCount').textContent = data.driver.totalTrips || 0;
        document.getElementById('driverRating').textContent = (data.driver.rating || 5.0).toFixed(1);
      }
    } catch {}
  }

  function showActiveRide(ride) {
    const section = document.getElementById('activeRideSection');
    section.style.display = 'block';
    const userName = ride.userId?.name || 'Usuario';
    const pickup = ride.pickup?.address || '---';
    const dest = ride.destination?.address || '---';
    const price = ride.price || 0;
    const status = ride.status;

    let actionButtons = '';
    if (status === 'accepted') {
      actionButtons = '<button class="btn-green" onclick="updateRideStatus(\'arrived\')"><i class="fas fa-check"></i> Llegue al lugar</button><button class="btn-small" onclick="openChat()"><i class="fas fa-comment"></i> Chat</button><button class="btn-red" onclick="cancelCurrentRide()"><i class="fas fa-ban"></i> Cancelar</button>';
    } else if (status === 'arrived') {
      actionButtons = '<button class="btn-green" onclick="updateRideStatus(\'start\')"><i class="fas fa-play"></i> Iniciar viaje</button><button class="btn-small" onclick="openChat()"><i class="fas fa-comment"></i> Chat</button><button class="btn-red" onclick="cancelCurrentRide()"><i class="fas fa-ban"></i> Cancelar</button>';
    } else if (status === 'in_progress') {
      actionButtons = '<button class="btn-green" onclick="updateRideStatus(\'complete\')"><i class="fas fa-flag-checkered"></i> Completar viaje</button><button class="btn-small" onclick="openChat()"><i class="fas fa-comment"></i> Chat</button>';
    }

    section.innerHTML = '<div class="active-ride"><div class="user-name"><i class="fas fa-user"></i> ' + userName + '</div><div class="route">' + pickup + ' → ' + dest + '</div><div style="font-size:20px;font-weight:700;margin:8px 0">S/ ' + price + '.00</div><div class="actions">' + actionButtons + '</div></div>';
  }

  function openChat() {
    if (currentRide) location.href = 'chat.html?rideId=' + currentRide._id;
    else alert('Sin viaje activo');
  }

  async function updateRideStatus(status) {
    if (!currentRide || updatingRide) return;
    updatingRide = true;
    const userId = currentRide.userId?._id || currentRide.userId;
    try {
      if (status === 'arrived') {
        await API.arrivedRide(currentRide._id);
        SOCKET.emit('ride:arrived', { rideId: currentRide._id, userId });
      } else if (status === 'start') {
        await API.startRide(currentRide._id);
        SOCKET.emit('ride:start', { rideId: currentRide._id, userId });
      } else if (status === 'complete') {
        await API.completeRide(currentRide._id);
        SOCKET.emit('ride:complete', { rideId: currentRide._id, userId });
        currentRide = null;
        const section = document.getElementById('activeRideSection');
        section.style.display = 'none';
        section.innerHTML = '';
        updatingRide = false;
        loadDriverStats();
        alert('Viaje completado!');
        return;
      }
      const updated = await API.getDriverActiveRide();
      if (updated.ride) {
        currentRide = updated.ride;
        showActiveRide(updated.ride);
      }
    } catch (err) { alert('Error: ' + err.message); }
    updatingRide = false;
    loadDriverStats();
  }

  async function cancelCurrentRide() {
    if (!currentRide || !confirm('Cancelar viaje?')) return;
    try {
      const userId = currentRide.userId?._id || currentRide.userId;
      SOCKET.emit('ride:cancelled', { rideId: currentRide._id, userId });
      await API.cancelRide(currentRide._id);
      currentRide = null;
      document.getElementById('activeRideSection').style.display = 'none';
    } catch {}
  }

  function playNotification() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
      setTimeout(() => {
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.value = 1100;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.3, ctx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc2.start(ctx.currentTime);
        osc2.stop(ctx.currentTime + 0.3);
      }, 200);
    } catch {}
  }

  SOCKET.on('ride:new', (data) => {
    if (!available) return;
    playNotification();
    const container = document.getElementById('requestsContainer');
    const item = document.createElement('div');
    item.className = 'request-item';
    item.id = 'req-' + data.rideId;
    item.innerHTML = '<div class="info"><div class="name"><i class="fas fa-user"></i> ' + (data.userName || 'Usuario') + '</div><div class="detail">' + (data.pickup?.address || '---') + ' → ' + (data.destination?.address || '---') + '</div><div class="price">S/ ' + (data.price || 0) + '.00</div></div><button class="btn-small" onclick="acceptRide(\'' + data.rideId + '\',\'' + (data.userName || '') + '\',\'' + (data.pickup?.address || '') + '\',\'' + (data.destination?.address || '') + '\',' + (data.price || 8) + ')">Aceptar</button>';
    container.prepend(item);
    setTimeout(() => { const el = document.getElementById('req-' + data.rideId); if (el) el.remove(); }, 30000);
  });

  SOCKET.on('ride:taken', (data) => {
    const el = document.getElementById('req-' + data.rideId);
    if (el) el.remove();
  });

  async function acceptRide(rideId, userName, pickup, dest, price) {
    if (!available) { alert('Activate primero'); return; }
    try {
      const user = API.getUser();
      const result = await API.acceptRide(rideId);
      const ride = result.ride;
      currentRide = ride || { _id: rideId, userId: { name: userName }, pickup: { address: pickup }, destination: { address: dest }, price, status: 'accepted' };
      document.getElementById('requestsContainer').innerHTML = '';
      showActiveRide(currentRide);
      loadDriverStats();
      alert('Viaje aceptado! Dirigete al punto de recogida.');
    } catch (err) { alert('Error: ' + err.message); }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await API.refreshProfile();
    try {
      const driverData = await API.request('/api/drivers/status');
      if (driverData.driver) {
        available = driverData.driver.available;
        updateStatus();
        if (available) {
          SOCKET.connect();
          if (localStorage.getItem('motocasma_online_start')) {
            onlineTimer = setInterval(updateOnlineTime, 10000);
            updateOnlineTime();
          }
        }
      }
    } catch {}
    loadActiveRide();
  });
</script>
</body>
</html>
