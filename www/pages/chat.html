<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotoCasma - Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/socket.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #e5e7eb; }
    .container { max-width: 480px; margin: 0 auto; background: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, #fbbf24, #f59e0b); padding: 14px 16px; display: flex; align-items: center; gap: 12px; color: #1f2937; }
    .header h1 { font-size: 18px; font-weight: 800; flex: 1; }
    .header i { font-size: 20px; cursor: pointer; }
    .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: #fbbf24; color: #1f2937; border-bottom-right-radius: 4px; }
    .msg.driver { align-self: flex-start; background: white; color: #1f2937; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .msg .time { font-size: 11px; color: #6b7280; margin-top: 4px; text-align: right; }
    .msg.user .time { color: #92400e; }
    .input-bar { display: flex; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid #e5e7eb; }
    .input-bar input { flex: 1; border: 1px solid #d1d5db; border-radius: 50px; padding: 12px 16px; font-size: 14px; outline: none; }
    .input-bar input:focus { border-color: #fbbf24; }
    .input-bar button { background: #fbbf24; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .empty-chat { text-align: center; color: #9ca3af; padding: 60px 20px; font-size: 14px; }
    .empty-chat i { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <i class="fas fa-arrow-left" onclick="history.back()"></i>
    <h1><i class="fas fa-comment"></i> Chat</h1>
    <i class="fas fa-phone"></i>
  </div>
  <div class="messages" id="messagesContainer">
    <div class="empty-chat" id="emptyChat"><i class="fas fa-comment-dots"></i><div>Envia un mensaje al conductor</div></div>
  </div>
  <div class="input-bar">
    <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>
<script>
  let rideId = new URLSearchParams(location.search).get('rideId');

  async function loadMessages() {
    if (!rideId) { document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat"><i class="fas fa-exclamation-triangle"></i><div>Sin viaje activo</div></div>'; return; }
    try {
      const res = await API.request('/api/chat/' + rideId);
      const msgs = res.messages || [];
      const container = document.getElementById('messagesContainer');
      if (!msgs.length) return;
      document.getElementById('emptyChat').style.display = 'none';
      container.innerHTML = msgs.map(m => renderMessage(m)).join('');
      container.scrollTop = container.scrollHeight;
    } catch {}
  }

  function renderMessage(m) {
    const user = API.getUser();
    const isMe = (user && m.senderId === user.id) || (user && m.senderId === user._id);
    const role = isMe ? 'user' : 'driver';
    const time = new Date(m.createdAt).toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
    return '<div class="msg ' + role + '">' + m.text + '<div class="time">' + time + '</div></div>';
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !rideId) return;
    input.value = '';
    const user = API.getUser();
    const senderId = user?._id || user?.id;
    const senderRole = user?.role === 'driver' || user?.role === 'owner' ? 'driver' : 'user';
    SOCKET.emit('chat:send', { rideId, senderId, senderRole, text });
    const container = document.getElementById('messagesContainer');
    document.getElementById('emptyChat').style.display = 'none';
    container.innerHTML += '<div class="msg user">' + text + '<div class="time">' + new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' }) + '</div></div>';
    container.scrollTop = container.scrollHeight;
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (!API.isLoggedIn()) { location.href = 'profile.html'; return; }
    SOCKET.connect();
    if (rideId) SOCKET.emit('chat:join', { rideId });
    SOCKET.on('chat:receive', (data) => {
      const user = API.getUser();
      const isMe = (user && data.senderId === user.id) || (user && data.senderId === user._id);
      if (isMe) return;
      document.getElementById('emptyChat').style.display = 'none';
      const container = document.getElementById('messagesContainer');
      container.innerHTML += renderMessage(data);
      container.scrollTop = container.scrollHeight;
    });
    loadMessages();
  });
</script>
</body>
</html>
