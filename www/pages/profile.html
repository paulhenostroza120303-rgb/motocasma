<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotoCasma - Perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/socket.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
    .container { max-width: 480px; margin: 0 auto; background: #f3f4f6; min-height: 100vh; padding-bottom: 80px; }
    .header { background: linear-gradient(135deg, #fbbf24, #f59e0b); padding: 16px; display: flex; align-items: center; gap: 12px; color: #1f2937; }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header i { cursor: pointer; }
    .profile-card { background: white; margin: 16px; border-radius: 20px; padding: 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #fbbf24, #f59e0b); display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; margin: 0 auto 12px; }
    .profile-card .name { font-size: 20px; font-weight: 700; }
    .profile-card .phone { font-size: 14px; color: #6b7280; }
    .menu-group { background: white; margin: 16px; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .menu-item { display: flex; align-items: center; gap: 14px; padding: 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: 0.2s; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item i { width: 24px; text-align: center; color: #f59e0b; font-size: 18px; }
    .menu-item span { flex: 1; font-weight: 500; color: #1f2937; }
    .menu-item .arrow { color: #d1d5db; }
    .menu-item:hover { background: #f9fafb; }
    .login-form { background: white; margin: 16px; border-radius: 20px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .login-form h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .login-form input { width: 100%; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 12px; margin-bottom: 12px; font-size: 16px; outline: none; }
    .login-form input:focus { border-color: #fbbf24; }
    .login-form .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #fbbf24, #f59e0b); border: none; border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer; }
    .logout-btn { background: white; margin: 16px; border-radius: 14px; padding: 16px; border: none; width: calc(100% - 32px); font-weight: 600; color: #ef4444; font-size: 16px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .hidden { display: none; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; border-top: 1px solid #e5e7eb; max-width: 480px; }
    .nav-item { text-align: center; font-size: 12px; color: #9ca3af; cursor: pointer; }
    .nav-item.active { color: #f59e0b; }
    .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <i class="fas fa-arrow-left" onclick="history.back()"></i>
    <h1>Mi Perfil</h1>
  </div>
  <div id="profileSection" class="hidden">
    <div class="profile-card">
      <div class="profile-avatar"><i class="fas fa-user"></i></div>
      <div class="name" id="profileName">---</div>
      <div class="phone" id="profilePhone">---</div>
    </div>
    <div class="menu-group">
      <div class="menu-item"><i class="fas fa-user-pen"></i><span>Editar perfil</span><i class="fas fa-chevron-right arrow"></i></div>
      <div class="menu-item"><i class="fas fa-motorcycle"></i><span>Modo conductor</span><i class="fas fa-chevron-right arrow"></i></div>
      <div class="menu-item" id="adminMenuItem" style="display:none" onclick="location.href='admin-drivers.html'"><i class="fas fa-crown" style="color:#f59e0b"></i><span style="color:#f59e0b;font-weight:700">Panel de Administrador</span><i class="fas fa-chevron-right arrow"></i></div>
      <div class="menu-item"><i class="fas fa-bell"></i><span>Notificaciones</span><i class="fas fa-chevron-right arrow"></i></div>
      <div class="menu-item"><i class="fas fa-circle-info"></i><span>Ayuda</span><i class="fas fa-chevron-right arrow"></i></div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Cerrar sesion</button>
  </div>
  <div id="loginSection">
    <div class="login-form">
      <h3><i class="fas fa-phone"></i> Iniciar Sesion</h3>
      <input type="tel" id="phoneInput" placeholder="+51 999 888 777" value="+51" />
      <input type="text" id="nameInput" placeholder="Tu nombre" />
      <button class="btn-login" onclick="login()"><i class="fas fa-arrow-right"></i> Ingresar</button>
      <p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:8px">Registro con numero de telefono</p>
    </div>
  </div>
  <div class="nav-bottom">
    <div class="nav-item" onclick="location.href='../index.html'"><i class="fas fa-home"></i>Inicio</div>
    <div class="nav-item" onclick="location.href='drivers.html'"><i class="fas fa-search"></i>Buscar</div>
    <div class="nav-item" onclick="location.href='request.html'"><i class="fas fa-plus-circle"></i>Pedir</div>
    <div class="nav-item" onclick="location.href='history.html'"><i class="fas fa-clock"></i>Historial</div>
    <div class="nav-item active"><i class="fas fa-user"></i>Perfil</div>
  </div>
</div>
<script>
  function showProfile() {
    const user = API.getUser();
    if (user) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('profileSection').classList.remove('hidden');
      document.getElementById('profileName').textContent = user.name || 'Usuario';
      document.getElementById('profilePhone').textContent = user.phone || '---';
      if (API.isOwner()) document.getElementById('adminMenuItem').style.display = 'flex';
    } else {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('profileSection').classList.add('hidden');
    }
  }

  async function login() {
    const phone = document.getElementById('phoneInput').value.trim();
    const name = document.getElementById('nameInput').value.trim();
    if (!phone || phone.length < 5) { alert('Ingresa un numero valido'); return; }
    try {
      await API.sendCode(phone);
      const data = await API.verifyCode(phone, name || phone);
      API.setToken(data.token);
      API.setUser(data.user);
      alert('Bienvenido ' + (data.user.name || '') + '!');
      SOCKET.connect();
      showProfile();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  function logout() {
    if (confirm('Cerrar sesion?')) {
      API.logout();
      SOCKET.disconnect();
      showProfile();
    }
  }

  document.addEventListener('DOMContentLoaded', showProfile);
</script>
</body>
</html>
