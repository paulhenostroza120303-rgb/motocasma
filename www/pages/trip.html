<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotoCasma - En Viaje</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/socket.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
    .container { max-width: 480px; margin: 0 auto; background: #f3f4f6; min-height: 100vh; padding-bottom: 80px; }
    .header { background: linear-gradient(135deg, #fbbf24, #f59e0b); padding: 16px; display: flex; align-items: center; justify-content: space-between; color: #1f2937; }
    .header h1 { font-size: 18px; font-weight: 800; }
    .map-container { height: 220px; background: #d1d5db; position: relative; overflow: hidden; }
    .map-container iframe { width: 100%; height: 100%; border: 0; }
    .trip-status { background: white; margin: -20px 16px 0; border-radius: 20px; padding: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.10); position: relative; z-index: 2; }
    .driver-info { display: flex; align-items: center; gap: 14px; }
    .driver-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #fbbf24, #f59e0b); display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
    .driver-details { flex: 1; }
    .driver-details .name { font-weight: 700; font-size: 18px; }
    .driver-details .rating { color: #f59e0b; font-size: 14px; }
    .driver-details .plate { font-size: 13px; color: #6b7280; font-family: monospace; }
    .trip-progress { margin-top: 16px; }
    .progress-dot { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .progress-dot .dot { width: 10px; height: 10px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
    .progress-dot .dot.active { background: #fbbf24; box-shadow: 0 0 0 4px rgba(251,191,36,0.2); }
    .progress-dot .dot.completed { background: #10b981; box-shadow: 0 0 0 4px rgba(16,185,129,0.2); }
    .progress-dot .label { font-size: 14px; color: #6b7280; }
    .progress-dot .label.active { color: #1f2937; font-weight: 600; }
    .progress-dot .label.completed { color: #10b981; font-weight: 600; }
    .eta-card { background: #1f2937; margin: 16px; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; color: white; }
    .eta-card .time { font-size: 32px; font-weight: 800; }
    .eta-card .sub { font-size: 13px; color: #9ca3af; }
    .action-buttons { display: flex; gap: 12px; margin: 16px; }
    .action-btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
    .action-btn.call { background: #10b981; color: white; }
    .action-btn.cancel { background: #fee2e2; color: #ef4444; }
    #cancelBtn { display: block; }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-card { background:white; border-radius:24px; padding:24px; width:320px; text-align:center; }
    .modal-card h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
    .modal-card .stars { font-size:40px; margin:16px 0; cursor:pointer; }
    .modal-card .stars i { color:#d1d5db; margin:0 4px; transition:0.2s; }
    .modal-card .stars i.active { color:#f59e0b; }
    .modal-card .star-hint { font-size:13px; color:#9ca3af; margin-bottom:16px; }
    .btn-rate { background:linear-gradient(135deg,#fbbf24,#f59e0b); border:none; padding:14px 0; width:100%; border-radius:50px; font-weight:700; font-size:16px; cursor:pointer; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; border-top: 1px solid #e5e7eb; max-width: 480px; }
    .nav-item { text-align: center; font-size: 12px; color: #9ca3af; cursor: pointer; }
    .nav-item.active { color: #f59e0b; }
    .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-motorcycle"></i> <span id="statusText">Buscando...</span></h1>
    <span id="priceDisplay" style="font-size:14px;font-weight:600">S/ 0.00</span>
  </div>
  <div class="map-container">
    <iframe id="mapFrame" src="https://www.openstreetmap.org/export/embed.html?bbox=-78.308,-9.462,-78.290,-9.446&layer=mapnik" allowfullscreen loading="lazy"></iframe>
  </div>
  <div class="trip-status">
    <div class="driver-info">
      <div class="driver-avatar"><i class="fas fa-user"></i></div>
      <div class="driver-details">
        <div class="name" id="driverName">Buscando conductor...</div>
        <div class="rating" id="driverRating"><i class="fas fa-star"></i> --</div>
        <div class="plate" id="driverPlate">---</div>
      </div>
    </div>
    <div class="trip-progress">
      <div class="progress-dot"><div class="dot active" id="dotSearching"></div><span class="label active" id="labelSearching">Buscando conductor</span></div>
      <div class="progress-dot"><div class="dot" id="dotAccepted"></div><span class="label" id="labelAccepted">Conductor acepto</span></div>
      <div class="progress-dot"><div class="dot" id="dotArrived"></div><span class="label" id="labelArrived">Conductor llego</span></div>
      <div class="progress-dot"><div class="dot" id="dotInProgress"></div><span class="label" id="labelInProgress">En viaje</span></div>
      <div class="progress-dot"><div class="dot" id="dotComplete"></div><span class="label" id="labelComplete">Completado</span></div>
    </div>
  </div>
  <div class="eta-card" id="etaCard">
    <div><div class="time" id="etaTime">--</div><div class="sub">Tiempo estimado</div></div>
    <div style="text-align:right"><div style="font-size:18px;font-weight:700" id="etaDistance">--</div><div class="sub">Distancia</div></div>
  </div>
  <div class="action-buttons">
    <button class="action-btn call"><i class="fas fa-phone"></i> Llamar</button>
    <button class="action-btn cancel" id="cancelBtn" onclick="cancelTrip()"><i class="fas fa-ban"></i> Cancelar</button>
  </div>
  <div class="nav-bottom">
    <div class="nav-item active"><i class="fas fa-motorcycle"></i>Viaje</div>
    <div class="nav-item"><i class="fas fa-comment"></i>Chat</div>
    <div class="nav-item" onclick="location.href='../index.html'"><i class="fas fa-home"></i>Inicio</div>
  </div>
</div>

<div id="ratingModal" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <h2>Calificar viaje</h2>
    <p style="color:#6b7280;font-size:14px">Como fue tu viaje con <strong id="rateDriverName">conductor</strong>?</p>
    <div class="stars" id="starContainer">
      <i class="fas fa-star" data-v="1"></i><i class="fas fa-star" data-v="2"></i><i class="fas fa-star" data-v="3"></i><i class="fas fa-star" data-v="4"></i><i class="fas fa-star" data-v="5"></i>
    </div>
    <div class="star-hint" id="starHint">Toca para calificar</div>
    <button class="btn-rate" onclick="submitRating()"><i class="fas fa-check"></i> Calificar</button>
  </div>
</div>

<script>
  let rideId = null;
  let selectedRating = 0;

  async function loadRide() {
    if (!API.isLoggedIn()) { location.href = 'profile.html'; return; }
    try {
      const data = await API.getActiveRide();
      if (!data.ride) {
        const doneRide = await API.getLastRideForRating();
        if (doneRide && doneRide.ride && !doneRide.ride.rated) {
          rideId = doneRide.ride._id;
          document.getElementById('rateDriverName').textContent = doneRide.ride.driverId?.name || 'Conductor';
          document.getElementById('ratingModal').style.display = 'flex';
        } else {
          location.href = '../index.html';
        }
        return;
      }
      const r = data.ride;
      rideId = r._id;
      document.getElementById('priceDisplay').textContent = 'S/ ' + r.price + '.00';
      if (r.driverId) {
        document.getElementById('driverName').textContent = r.driverId.name || 'Conductor';
        document.getElementById('driverRating').innerHTML = '<i class="fas fa-star"></i> ' + (r.driverId.rating || '--');
        document.getElementById('driverPlate').textContent = r.driverId.vehiclePlate || '---';
      }
      updateProgress(r.status);
      showActionButtons(r.status);
    } catch { location.href = '../index.html'; }
  }

  function updateProgress(status) {
    const steps = ['searching','accepted','arrived','in_progress','completed'];
    const dots = ['dotSearching','dotAccepted','dotArrived','dotInProgress','dotComplete'];
    const labels = ['labelSearching','labelAccepted','labelArrived','labelInProgress','labelComplete'];
    const idx = steps.indexOf(status);
    if (idx === -1) return;
    dots.forEach((id, i) => {
      const el = document.getElementById(id);
      el.className = 'dot';
      if (i < idx) el.classList.add('completed');
      else if (i === idx) el.classList.add('active');
      document.getElementById(labels[i]).className = 'label';
      if (i < idx) document.getElementById(labels[i]).classList.add('completed');
      else if (i === idx) document.getElementById(labels[i]).classList.add('active');
    });
    const statusMap = { searching: 'Buscando...', accepted: 'Conductor en camino', arrived: 'Conductor llego', in_progress: 'En viaje', completed: 'Completado' };
    document.getElementById('statusText').textContent = statusMap[status] || 'En viaje';
  }

  function showActionButtons(status) {
    const cancelBtn = document.getElementById('cancelBtn');
    if (status === 'completed') cancelBtn.style.display = 'none';
    else cancelBtn.style.display = 'block';
  }

  async function cancelTrip() {
    if (!confirm('Cancelar viaje?')) return;
    try {
      if (rideId) await API.cancelRide(rideId);
      alert('Viaje cancelado');
      location.href = '../index.html';
    } catch { location.href = '../index.html'; }
  }

  document.querySelectorAll('#starContainer i').forEach(el => {
    el.addEventListener('click', function() {
      selectedRating = parseInt(this.dataset.v);
      document.querySelectorAll('#starContainer i').forEach((s, i) => {
        s.classList.toggle('active', i < selectedRating);
      });
      document.getElementById('starHint').textContent = selectedRating === 5 ? 'Excelente!' : selectedRating === 4 ? 'Buen viaje' : selectedRating === 3 ? 'Regular' : 'Malo';
    });
  });

  async function submitRating() {
    if (!selectedRating) { alert('Selecciona una calificacion'); return; }
    try {
      await API.rateRide(rideId, selectedRating);
      document.getElementById('ratingModal').style.display = 'none';
      alert('Gracias por calificar!');
      location.href = '../index.html';
    } catch (err) { alert('Error: ' + err.message); }
  }

  document.addEventListener('DOMContentLoaded', () => {
    SOCKET.connect();
    SOCKET.on('ride:accepted', (data) => {
      document.getElementById('driverName').textContent = data.driverName || (data.driver ? data.driver.name : 'Conductor');
      updateProgress('accepted');
    });
    SOCKET.on('ride:status', (data) => {
      updateProgress(data.status);
      if (data.status === 'arrived') {
        document.getElementById('statusText').textContent = 'Conductor llego';
      } else if (data.status === 'in_progress') {
        document.getElementById('statusText').textContent = 'En viaje';
      } else if (data.status === 'completed') {
        document.getElementById('statusText').textContent = 'Completado';
        document.getElementById('cancelBtn').style.display = 'none';
        setTimeout(async () => {
          const done = await API.getLastRideForRating();
          if (done && done.ride && !done.ride.rated) {
            rideId = done.ride._id;
            document.getElementById('rateDriverName').textContent = done.ride.driverId?.name || 'Conductor';
            document.getElementById('ratingModal').style.display = 'flex';
          }
        }, 1500);
      }
      showActionButtons(data.status);
    });
    SOCKET.on('ride:driver_location', (data) => {
      if (data.lat && data.lng) {
        document.getElementById('mapFrame').src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + (data.lng - 0.008) + ',' + (data.lat - 0.008) + ',' + (data.lng + 0.008) + ',' + (data.lat + 0.008) + '&layer=mapnik&marker=' + data.lat + ',' + data.lng;
        document.getElementById('etaTime').textContent = '5 min';
        document.getElementById('etaDistance').textContent = '1.2 km';
      }
    });
    loadRide();
  });
</script>
</body>
</html>
